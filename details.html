<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOTOTIRE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700&family=Nunito:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link
      rel="stylesheet"
      href="https://unpkg.com/swiper@7/swiper-bundle.min.css"
    />
  
    <link rel="stylesheet" href="./styles/style.css">
  </head>
<body>

  <section class="detail">
    <div class="container">
      <div class="detail__wrapper">
        <div class="tire__gallery">
          <div class="tire__big__wrapper">
            <div class="swiper product__swiper__detail">
              <div class="swiper-wrapper">
                <div class="swiper-slide product__detail">
                  <img src="./images/bridgestone_ecopia.png" alt="">
                </div>
                <div class="swiper-slide product__detail">
                  <img src="./images/NoPath - copia (14).png" alt="">
                </div>
                <div class="swiper-slide product__detail">
                  <img src="./images/NoPath - copia (6).png" alt="">
                </div>
              </div>
            </div>
            <div class="detail__pagination"></div>
          </div>

          <div thumbsSlider="" class="swiper product__swiper__thumb">
            <div class="swiper-wrapper">
              <div class="swiper-slide">
                <img src="./images/bridgestone_ecopia.png" alt="">
              </div>
              <div class="swiper-slide">
                <img src="./images/NoPath - copia (14).png" alt="">
              </div>
              <div class="swiper-slide">
                <img src="./images/NoPath - copia (6).png" alt="">
              </div>
            </div>
          </div>
        </div>
        <div class="tire__info">
          <div class="tire__name">
            <h2>bridgstestone</h2>
            <h1>ecopia ep150</h1>
          </div>

          <div class="tire__references">
            <p>Tamaño</p>
            <div class="tire__references__wrapper">
              <button class="btn__selector">190 / 50R16</button>
              <button class="btn__selector btn__selector--selected">185 / 65R15</button>
              <button class="btn__selector">185 / 65R15</button>
              <button class="btn__selector">185 / 65R15</button>
              <button class="btn__selector">190 / 50R16</button>
              <button class="btn__selector btn__selector--selected">185 / 65R15</button>
              <button class="btn__selector">185 / 65R15</button>
              <button class="btn__selector">185 / 65R15</button>
            </div>
          </div>

          <div class="tire__price">
            <p class="disclaimer">*Este producto no incluye el Rin</p>
            <p class="price__label">precio</p>
            <p class="price">$455.927</p>
            <button class="btn btn--action">Comprar</button>
          </div>
        </div>
      </div>
    </div>
  </section>
  

  <section class="tire__detail__info">
    <div class="container">
      <div class="detail__info__wrapper">
        <h2>Especificaciones tecnicas</h2>
        <div class="features">
          <div class="medidor">
            <div class="test__animations"></div>
          </div>
        </div>
        <div class="tech__table">
          <div class="tech__feature">
            <p class="tech__feature__label">Marca</p>
            <p class="tech__feature__data">bridgstestone</p>
          </div>
          <div class="tech__feature">
            <p class="tech__feature__label">Modelo</p>
            <p class="tech__feature__data">ECOPIA EP150</p>
          </div>
          <div class="tech__feature">
            <p class="tech__feature__label">Uso</p>
            <p class="tech__feature__data">Automóvil</p>
          </div>
          <div class="tech__feature">
            <p class="tech__feature__label">Ancho</p>
            <p class="tech__feature__data">185</p>
          </div>
          <div class="tech__feature">
            <p class="tech__feature__label">Perfil</p>
            <p class="tech__feature__data">65</p>
          </div>
          <div class="tech__feature">
            <p class="tech__feature__label">Rin</p>
            <p class="tech__feature__data">15</p>
          </div>
          <div class="tech__feature">
            <p class="tech__feature__label">Indice de velocidad</p>
            <p class="tech__feature__data">H</p>
          </div>
          <div class="tech__feature">
            <p class="tech__feature__label">Indice de carga</p>
            <p class="tech__feature__data">91</p>
          </div>
        </div>
      </div>
    </div>
  </section>


  <script src="https://unpkg.com/swiper@7/swiper-bundle.min.js"></script>
  <script src="./scritps/script.js"></script>
</body>
</html>
